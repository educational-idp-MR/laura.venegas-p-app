apiVersion: v1
kind: Namespace
metadata:
  name: laura-venegas-p-app-monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: laura-venegas-p-app-monitoring
  labels:
    app: laura-venegas-p-app-monitoring
  namespace: laura-venegas-p-app-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laura-venegas-p-app-monitoring
  template:
    metadata:
      labels:
        app: laura-venegas-p-app-monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: laura-venegas-p-app-monitoring
        image: hello-world:latest #Workflows will update this image
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: laura-venegas-p-app-monitoring
  labels:
    app: laura-venegas-p-app-monitoring
  namespace: laura-venegas-p-app-monitoring
spec:
  selector:
    app: laura-venegas-p-app-monitoring
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laura-venegas-p-app-monitoring-ingress
  namespace: laura-venegas-p-app-monitoring
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: laura-venegas-p-app.obs-stack.eci-idp.click
      http:
        paths:
          - path: /.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: laura-venegas-p-app-monitoring
                port:
                  number: 80